name: CI/CD

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

env:
  ACR_REGISTRY: crpi-1qmuw0ewrqqeai38.cn-beijing.personal.cr.aliyuncs.com
  ACR_VPC_REGISTRY: crpi-1qmuw0ewrqqeai38-vpc.cn-beijing.personal.cr.aliyuncs.com
  ACR_NAMESPACE: yeen
  ACR_USERNAME: aliyun1054531571
  API_IMAGE: lumitime_api
  NGINX_IMAGE: lumitime_nginx
  IMAGE_TAG: sha-${{ github.sha }}
  DEPLOY_PATH: /opt/lumitime/app
  PUBLIC_HEALTH_URL: https://yeen666.cn/api/v1/health

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt pytest httpx

      - name: Verify backend test dependencies
        run: python -c "import httpx; from fastapi.testclient import TestClient; print('backend test dependencies ok')"

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  docker:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check ACR secrets
        env:
          ACR_PASSWORD: ${{ secrets['ALIYUN1054531571'] }}
        run: |
          if [ -z "$ACR_PASSWORD" ]; then
            echo "::error::Missing repository secret ALIYUN1054531571."
            exit 1
          fi

      - name: Log in to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ env.ACR_USERNAME }}
          password: ${{ secrets['ALIYUN1054531571'] }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.API_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.API_IMAGE }}:latest

      - name: Build and push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.nginx
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.NGINX_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_NAMESPACE }}/${{ env.NGINX_IMAGE }}:latest

  deploy:
    name: Deploy to Aliyun ECS
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
    env:
      ALIYUN_HOST: ${{ secrets.ALIYUN_HOST || '47.93.31.206' }}
      ALIYUN_USER: ${{ secrets.ALIYUN_USER || 'root' }}
      ALIYUN_PORT: ${{ secrets.ALIYUN_PORT || '22' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check deploy secrets
        env:
          ACR_PASSWORD: ${{ secrets['ALIYUN1054531571'] }}
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          if [ -z "$ACR_PASSWORD" ]; then
            echo "::error::Missing repository secret ALIYUN1054531571."
            exit 1
          fi
          if [ -z "$ALIYUN_SSH_KEY" ]; then
            echo "::error::Missing repository secret ALIYUN_SSH_KEY."
            exit 1
          fi

      - name: Configure SSH
        env:
          ALIYUN_SSH_KEY: ${{ secrets.ALIYUN_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$ALIYUN_SSH_KEY" > ~/.ssh/aliyun_deploy_key
          chmod 600 ~/.ssh/aliyun_deploy_key
          ssh-keyscan -p "$ALIYUN_PORT" "$ALIYUN_HOST" >> ~/.ssh/known_hosts

      - name: Copy release files to ECS
        run: |
          tar \
            --exclude='.git' \
            --exclude='deploy/.env' \
            --exclude='backend/lumitime.db' \
            --exclude='backend/uploads' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            -czf - . \
            | ssh -i ~/.ssh/aliyun_deploy_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
              "mkdir -p '$DEPLOY_PATH' && tar -xzf - -C '$DEPLOY_PATH'"

      - name: Log in to ACR from ECS
        env:
          ACR_PASSWORD: ${{ secrets['ALIYUN1054531571'] }}
        run: |
          printf '%s' "$ACR_PASSWORD" \
            | ssh -i ~/.ssh/aliyun_deploy_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
              "docker login --username '$ACR_USERNAME' --password-stdin '$ACR_VPC_REGISTRY'"

      - name: Deploy release
        run: |
          API_IMAGE_REF="$ACR_VPC_REGISTRY/$ACR_NAMESPACE/$API_IMAGE:$IMAGE_TAG"
          NGINX_IMAGE_REF="$ACR_VPC_REGISTRY/$ACR_NAMESPACE/$NGINX_IMAGE:$IMAGE_TAG"
          ssh -i ~/.ssh/aliyun_deploy_key -p "$ALIYUN_PORT" "$ALIYUN_USER@$ALIYUN_HOST" \
            "DEPLOY_PATH='$DEPLOY_PATH' API_IMAGE_REF='$API_IMAGE_REF' NGINX_IMAGE_REF='$NGINX_IMAGE_REF' HEALTH_URL='$PUBLIC_HEALTH_URL' bash -s" <<'REMOTE'
          set -euo pipefail
          cd "$DEPLOY_PATH"

          python3 - <<'PY'
          import os
          from pathlib import Path

          env_path = Path("deploy/.env")
          lines = env_path.read_text().splitlines()
          updates = {
              "LUMITIME_API_IMAGE": os.environ["API_IMAGE_REF"],
              "LUMITIME_NGINX_IMAGE": os.environ["NGINX_IMAGE_REF"],
              "LUMITIME_ENABLE_INLINE_WORKER": "1",
              "LUMITIME_LOG_SUBMIT_MODE": "dry_run",
          }
          seen = set()
          output = []
          for line in lines:
              if "=" in line and not line.lstrip().startswith("#"):
                  key = line.split("=", 1)[0]
                  if key in updates:
                      output.append(f"{key}={updates[key]}")
                      seen.add(key)
                      continue
              output.append(line)
          for key, value in updates.items():
              if key not in seen:
                  output.append(f"{key}={value}")
          env_path.write_text("\n".join(output) + "\n")
          PY

          docker compose --env-file deploy/.env -f deploy/compose.prod.yml pull api nginx migrate
          docker compose --env-file deploy/.env -f deploy/compose.prod.yml up -d --no-build --force-recreate migrate api nginx

          for attempt in $(seq 1 30); do
            if curl -fsS "$HEALTH_URL" >/dev/null; then
              docker compose --env-file deploy/.env -f deploy/compose.prod.yml ps
              exit 0
            fi
            sleep 2
          done

          docker compose --env-file deploy/.env -f deploy/compose.prod.yml logs --tail=120 api nginx
          exit 1
          REMOTE
