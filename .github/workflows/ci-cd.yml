name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOCKERHUB_NAMESPACE: yeennnn
  API_IMAGE: lumitime-api
  NGINX_IMAGE: lumitime-nginx

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements.txt pytest httpx2

      - name: Verify backend test dependencies
        run: python -c "import httpx2; from fastapi.testclient import TestClient; print('backend test dependencies ok')"

      - name: Run backend tests
        run: python -m pytest backend/tests

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Enable pnpm
        run: corepack enable

      - name: Install frontend dependencies
        working-directory: frontend
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        working-directory: frontend
        run: pnpm test

      - name: Typecheck frontend
        working-directory: frontend
        run: pnpm typecheck

      - name: Build frontend
        working-directory: frontend
        run: pnpm build

  docker:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Check Docker Hub token secret
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::Missing repository secret DOCKERHUB_TOKEN."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_NAMESPACE }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata for API
        id: api_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.API_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Docker metadata for Nginx
        id: nginx_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_NAMESPACE }}/${{ env.NGINX_IMAGE }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.api
          push: true
          tags: ${{ steps.api_meta.outputs.tags }}
          labels: ${{ steps.api_meta.outputs.labels }}

      - name: Build and push Nginx image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/docker/Dockerfile.nginx
          push: true
          tags: ${{ steps.nginx_meta.outputs.tags }}
          labels: ${{ steps.nginx_meta.outputs.labels }}
