name: lumitime

x-api-build: &api-build
  context: ..
  dockerfile: deploy/docker/Dockerfile.api

x-nginx-build: &nginx-build
  context: ..
  dockerfile: deploy/docker/Dockerfile.nginx

x-api-environment: &api-environment
  LUMITIME_ENV: production
  LUMITIME_DATABASE_URL: ${LUMITIME_DATABASE_URL:?set LUMITIME_DATABASE_URL in deploy/.env}
  LUMITIME_SECRET_KEY: ${LUMITIME_SECRET_KEY:?set LUMITIME_SECRET_KEY in deploy/.env}
  LUMITIME_COOKIE_SECURE: "1"
  LUMITIME_CORS_ORIGINS: ${LUMITIME_CORS_ORIGINS:?set LUMITIME_CORS_ORIGINS in deploy/.env}
  LUMITIME_UPLOAD_DIR: ${LUMITIME_UPLOAD_DIR:-/var/lib/lumitime/uploads}
  LUMITIME_BOOTSTRAP_DEMO_DATA: "0"
  LUMITIME_ENABLE_INLINE_WORKER: "0"
  LUMITIME_AUTO_MIGRATE: "0"
  LUMITIME_REQUIRE_MIGRATED_DB: "1"
  LUMITIME_BOOTSTRAP_TOKEN: ${LUMITIME_BOOTSTRAP_TOKEN:-}

x-postgres-environment: &postgres-environment
  POSTGRES_DB: ${POSTGRES_DB:?set POSTGRES_DB in deploy/.env}
  POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER in deploy/.env}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in deploy/.env}

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      <<: *postgres-environment
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - ${LUMITIME_DATA_DIR:-/opt/lumitime/data}/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:?set POSTGRES_USER in deploy/.env} -d ${POSTGRES_DB:?set POSTGRES_DB in deploy/.env}",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  migrate:
    image: ${LUMITIME_API_IMAGE:-lumitime-api:local}
    build: *api-build
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *api-environment
    command: ["alembic", "upgrade", "head"]

  api:
    image: ${LUMITIME_API_IMAGE:-lumitime-api:local}
    build: *api-build
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      <<: *api-environment
    volumes:
      - ${LUMITIME_DATA_DIR:-/opt/lumitime/data}/uploads:/var/lib/lumitime/uploads
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=5).read()\"",
        ]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 25s

  nginx:
    image: ${LUMITIME_NGINX_IMAGE:-lumitime-nginx:local}
    build: *nginx-build
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      LUMITIME_SERVER_NAME: ${LUMITIME_SERVER_NAME:?set LUMITIME_SERVER_NAME in deploy/.env}
      LUMITIME_SSL_CERTIFICATE: ${LUMITIME_SSL_CERTIFICATE:-/etc/nginx/certs/fullchain.pem}
      LUMITIME_SSL_CERTIFICATE_KEY: ${LUMITIME_SSL_CERTIFICATE_KEY:-/etc/nginx/certs/privkey.pem}
      LUMITIME_CLIENT_MAX_BODY_SIZE: ${LUMITIME_CLIENT_MAX_BODY_SIZE:-50m}
      NGINX_ENVSUBST_FILTER: ^LUMITIME_
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${LUMITIME_CERT_DIR:-/opt/lumitime/certs}/fullchain.pem:/etc/nginx/certs/fullchain.pem:ro
      - ${LUMITIME_CERT_DIR:-/opt/lumitime/certs}/privkey.pem:/etc/nginx/certs/privkey.pem:ro

  backup:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *postgres-environment
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      BACKUP_ROOT: /backups
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      LUMITIME_SOURCE_DIR: /source
      LUMITIME_UPLOAD_DIR: /var/lib/lumitime/uploads
    volumes:
      - ${LUMITIME_BACKUP_DIR:-/opt/lumitime/backups}:/backups
      - ${LUMITIME_DATA_DIR:-/opt/lumitime/data}/uploads:/var/lib/lumitime/uploads:ro
      - ..:/source:ro
    command: ["sh", "/source/deploy/scripts/backup.sh"]

  restore:
    image: postgres:16-alpine
    restart: "no"
    depends_on:
      db:
        condition: service_healthy
    environment:
      <<: *postgres-environment
      RESTORE_ROOT: /backups
    volumes:
      - ${LUMITIME_BACKUP_DIR:-/opt/lumitime/backups}:/backups:ro
      - ${LUMITIME_DATA_DIR:-/opt/lumitime/data}/uploads:/var/lib/lumitime/uploads
      - ..:/source:ro
    command: ["sh", "/source/deploy/scripts/restore.sh"]
